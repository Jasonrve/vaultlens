services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vaultlens-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://127.0.0.1:8200"
    volumes:
      - ./vault/policies:/vault/policies:ro
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/audit:/vault/audit
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vaultlens-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    volumes:
      - ./vault/policies:/vault/policies:ro
      - ./vault/scripts:/vault/scripts:ro
    entrypoint: /bin/sh
    command: /vault/scripts/bootstrap.sh
    restart: "no"

  vaultlens:
    image: node:22-alpine
    container_name: vaultlens-app
    working_dir: /app
    depends_on:
      vault:
        condition: service_healthy
    environment:
      PORT: "3001"
      NODE_ENV: "development"
      VAULT_ADDR: "http://vault:8200"
      VAULT_SYSTEM_TOKEN: "root"
      VAULT_SKIP_TLS_VERIFY: "false"
      VAULT_AUDIT_SOURCE: "socket"
      VAULT_AUDIT_SOCKET_PORT: "9090"
      VAULT_AUDIT_SOCKET_HOST: "0.0.0.0"
      # Vault connects to the vaultlens service by name on the shared Docker network
      VAULT_AUDIT_SOCKET_VAULT_ADDRESS: "vaultlens:9090"
      VAULTLENS_CONFIG_STORAGE: "file"
    ports:
      - "3001:3001"
    volumes:
      - ./app:/app
    command: sh -c "npm install && npm run build && npm start"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health > /dev/null 2>&1 && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
